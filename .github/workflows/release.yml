name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # Opt into Node.js 24 for JS actions (Node 20 deprecated on runners).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build macOS (dmg + zip)
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Re-sign app bundle for macOS compatibility and repack dmg
        # macOS 26+ requires arm64 apps to have a proper ad-hoc signature.
        # Electron's linker-signed adhoc (flags=0x20002) is rejected;
        # codesign -s - produces a clean adhoc (flags=0x2) that macOS accepts.
        # We also fix ElectronAsarIntegrity in Info.plist (Electron 33+ verifies
        # the asar SHA256 on every launch).
        #
        # Strategy: mount DMG → ditto app to writable tmpdir → re-sign bottom-up
        # → repack DMG from original volume (preserving background + Applications
        # link + DS_Store) with the re-signed app replacing the old one.
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          DMG="release/Histora-${VERSION}-arm64.dmg"
          ZIP="release/Histora-${VERSION}-arm64-mac.zip"
          WORK="$(mktemp -d)"
          MOUNT="$WORK/mnt"
          APPDIR="$WORK/app"
          mkdir -p "$MOUNT" "$APPDIR"

          # ── 1. Mount original DMG (read-only is fine) ──────────────────────────
          hdiutil attach "$DMG" -nobrowse -mountpoint "$MOUNT" -quiet

          # ── 2. Copy app to writable tmpdir ────────────────────────────────────
          echo "→ Copying app bundle"
          ditto "$MOUNT/Histora.app" "$APPDIR/Histora.app"

          APP="$APPDIR/Histora.app"
          PLIST="$APP/Contents/Info.plist"
          ASAR="$APP/Contents/Resources/app.asar"

          # ── 3. Re-sign bottom-up ──────────────────────────────────────────────
          # CRITICAL: delete ALL old _CodeSignature dirs first. Otherwise
          # `codesign --force` on a sub-bundle (Histora Helper.app etc.) leaves
          # a stale/inconsistent CodeResources, and macOS 26 rejects it with
          # "code has no resources but signature indicates they must be present"
          # → app shows as "damaged" even though it launched fine on the build host.
          echo "→ Removing old _CodeSignature dirs"
          find "$APP" -name "_CodeSignature" -type d -print0 | while IFS= read -r -d '' d; do
            rm -rf "$d"
          done

          echo "→ Re-signing bottom-up"

          # a) All dylibs
          find "$APP" -name "*.dylib" -print0 | while IFS= read -r -d '' f; do
            codesign --sign - --force "$f" 2>/dev/null || true
          done

          # b) Electron Framework internal binary (must precede framework bundle)
          EF_BIN="$APP/Contents/Frameworks/Electron Framework.framework/Versions/A/Electron Framework"
          [ -f "$EF_BIN" ] && codesign --sign - --force "$EF_BIN" 2>/dev/null || true

          # c) .framework bundles (deepest path first)
          find "$APP/Contents/Frameworks" -name "*.framework" -print \
            | awk '{ print length, $0 }' | sort -rn | cut -d' ' -f2- \
            | while IFS= read -r f; do
                codesign --sign - --force "$f" 2>/dev/null || true
              done

          # d) Helper .app bundles (deepest first) — sign AFTER frameworks so
          #    each helper gets a fresh, complete CodeResources
          find "$APP/Contents/Frameworks" -name "*.app" -print \
            | awk '{ print length, $0 }' | sort -rn | cut -d' ' -f2- \
            | while IFS= read -r f; do
                codesign --sign - --force "$f" 2>/dev/null || true
              done

          # e) Main executable
          codesign --sign - --force "$APP/Contents/MacOS/Histora" 2>/dev/null || true

          # f) Fix ElectronAsarIntegrity — Electron 33+ validates asar SHA256 on launch
          echo "→ Updating ASAR integrity hash"
          ASAR_HASH=$(shasum -a 256 "$ASAR" | awk '{print $1}')
          python3 -c "
          import plistlib, pathlib, sys
          p = pathlib.Path('$PLIST')
          d = plistlib.loads(p.read_bytes())
          d['ElectronAsarIntegrity'] = {'Resources/app.asar': {'algorithm': 'SHA256', 'hash': '$ASAR_HASH'}}
          p.write_bytes(plistlib.dumps(d))
          print('  hash:', '$ASAR_HASH'[:16] + '...')
          "

          # g) Top-level bundle must be signed last
          codesign --sign - --force "$APP" 2>/dev/null || true

          # ── Verify the FULL chain before packaging (fail the build if broken) ──
          echo "→ Verifying signature integrity"
          codesign --verify --deep --verbose=2 "$APP" 2>&1 | tail -3
          codesign -dv "$APP/Contents/Frameworks/Electron Framework.framework" 2>&1 | grep flags || true

          # ── 4. Repack DMG: copy volume contents + swap in re-signed app ────────
          echo "→ Repacking DMG"
          STAGING="$WORK/staging"
          mkdir -p "$STAGING"

          # Copy DMG volume contents EXCEPT the old app and the Applications
          # symlink. CRITICAL: the Applications entry is a symlink → /Applications;
          # following it (ditto without -L handling) would recurse the runner's
          # entire /Applications (Xcode, etc.) and corrupt the image. We handle
          # symlinks explicitly and recreate the Applications link ourselves.
          find "$MOUNT" -mindepth 1 -maxdepth 1 | while read item; do
            name=$(basename "$item")
            [ "$name" = "Histora.app" ] && continue
            [ "$name" = "Applications" ] && continue
            if [ -L "$item" ]; then
              # preserve any other symlink as-is (do not follow)
              cp -R "$item" "$STAGING/$name"
            else
              ditto "$item" "$STAGING/$name" 2>/dev/null || cp -a "$item" "$STAGING/$name" 2>/dev/null || true
            fi
          done

          # Recreate the /Applications drag-target symlink
          ln -s /Applications "$STAGING/Applications"

          # Place the re-signed app
          ditto "$APP" "$STAGING/Histora.app"

          hdiutil detach "$MOUNT" -quiet

          rm -f "$DMG"
          hdiutil create \
            -volname "Histora ${VERSION}-arm64" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG" 2>&1 | tail -2

          # ── 5. Repack zip ───────────────────────────────────────────────────────
          echo "→ Repacking zip"
          rm -f "$ZIP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"

          rm -rf "$WORK"
          echo "→ Regenerating latest-mac.yml with correct checksums"
          DMG_SIZE=$(stat -f%z "$DMG")
          ZIP_SIZE=$(stat -f%z "$ZIP")
          DMG_SHA=$(openssl dgst -sha512 -binary "$DMG" | base64)
          ZIP_SHA=$(openssl dgst -sha512 -binary "$ZIP" | base64)
          DMG_NAME=$(basename "$DMG")
          ZIP_NAME=$(basename "$ZIP")
          RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          {
            printf 'version: %s\n' "$VERSION"
            printf 'files:\n'
            printf '  - url: %s\n' "$ZIP_NAME"
            printf '    sha512: %s\n' "$ZIP_SHA"
            printf '    size: %s\n' "$ZIP_SIZE"
            printf '  - url: %s\n' "$DMG_NAME"
            printf '    sha512: %s\n' "$DMG_SHA"
            printf '    size: %s\n' "$DMG_SIZE"
            printf 'path: %s\n' "$ZIP_NAME"
            printf 'sha512: %s\n' "$ZIP_SHA"
            printf "releaseDate: '%s'\n" "$RELEASE_DATE"
          } > release/latest-mac.yml

          echo "Done. Artifacts:"
          ls -lh "$DMG" "$ZIP"
          echo "latest-mac.yml:"
          cat release/latest-mac.yml

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Windows (nsis + portable)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-release
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-release
          path: release/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-release
          path: release/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Histora ${{ github.ref_name }}
          body: |
            ## Histora ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |---|---|---|
            | macOS | `*-arm64.dmg` | Apple Silicon (M1/M2/M3/M4) |
            | macOS | `*-arm64-mac.zip` | Apple Silicon zip |
            | Windows | `*-Setup.exe` | NSIS installer |
            | Windows | `*-Portable.exe` | No install needed |

            ### macOS 首次打开 / First Launch on macOS

            本应用暂未进行 Apple 公证（Notarization），首次打开需手动授权：

            **方法一（推荐）：** 右键点击 Histora.app → 选择「打开」→ 在弹出对话框中点击「打开」

            **方法二（终端）：**
            ```bash
            xattr -cr /Applications/Histora.app
            ```

            > This app is not yet notarized by Apple. On first launch, right-click → Open, then click Open in the dialog.
          files: |
            release/mac/*.dmg
            release/mac/*.zip
            release/mac/*.blockmap
            release/mac/latest-mac.yml
            release/win/*.exe
            release/win/*.blockmap
            release/win/latest.yml
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
